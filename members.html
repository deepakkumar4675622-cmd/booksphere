<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - BookSphere</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-book-sparkles"></i><span>BookSphere Pro</span></div>
            <ul class="nav-menu">
                <li><a href="index.html">🏠 Home</a></li>
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="books.html">📚 Books</a></li>
                <li><a href="members.html" class="active">👥 Members</a></li>
                <li><a href="transactions.html">🔄 Transactions</a></li>
            </ul>
            <button id="themeToggle" class="theme-btn">🌙</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header"><h1>👥 Member Management</h1><button onclick="showAddMemberModal()" class="btn-primary">+ Add Member</button></div>
        
        <div class="search-box" style="margin-bottom:20px;"><i class="fas fa-search"></i><input type="text" id="searchMemberInput" placeholder="Search by name, email or phone..."></div>
        
        <div class="members-grid" id="membersGrid"></div>
    </div>

    <div id="addMemberModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>Add New Member</h2><span class="close" onclick="closeMemberModal()">×</span></div>
        <form id="addMemberForm"><div class="form-row"><input type="text" id="memberName" placeholder="Full Name" required><input type="email" id="memberEmail" placeholder="Email" required></div>
        <div class="form-row"><input type="tel" id="memberPhone" placeholder="Phone"><select id="membershipType"><option>Student</option><option>Teacher</option><option>Researcher</option><option>General</option></select></div>
        <textarea id="memberAddress" placeholder="Address" rows="2"></textarea>
        <button type="submit" class="btn-primary btn-block">Add Member</button></form>
    </div></div>

    <footer><p>© 2024 BookSphere | Advanced Library Management System</p></footer>

    <script src="js/data.js"></script>
    <script src="js/members.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
